name: capella-build

on:
  push:
    branches:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    defaults:
      run:
        working-directory: .

    env:
      MAVEN_OPTS: -Xmx2g
      # Pin the mutable CBI targetplatform nightly URL for reproducibility.
      CBI_TPD_PIN: https://download.eclipse.org/cbi/updates/tpd/nightly/N202501210845

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Show toolchain versions
        run: |
          java -version
          mvn -version

      - name: Pin target-platform converter repository URL
        run: |
          sed -i "s#https://download.eclipse.org/cbi/updates/tpd/nightly/latest#${CBI_TPD_PIN}#g" releng/plugins/org.polarsys.capella.targets/pom.xml
          grep -n "cbi/updates/tpd/nightly" releng/plugins/org.polarsys.capella.targets/pom.xml

      - name: Generate target platform (.target from .targetplatform)
        run: mvn -B -V clean verify -f releng/plugins/org.polarsys.capella.targets/pom.xml

      - name: Download and install Temurin JREs for product packaging
        shell: bash
        run: |
          chmod +x scripts/prepare-product-jres.sh
          scripts/prepare-product-jres.sh --java-major 17 --clean

      - name: Build and package (Tycho full reactor)
        run: mvn -B -V verify -Pfull

      - name: Verify packaged archives exist
        shell: bash
        run: |
          set -euo pipefail
          base="releng/plugins/org.polarsys.capella.rcp.product/target/products"
          ls -lah "$base" || true

          check_pattern() {
            local pattern="$1"
            if ! compgen -G "$pattern" > /dev/null; then
              echo "Missing expected files for pattern: $pattern"
              exit 1
            fi
            echo "Matched files for $pattern"
            ls -1 $pattern
          }

          check_pattern "$base/capella-*linux*.tar.gz"
          check_pattern "$base/capella-*macosx*.tar.gz"
          check_pattern "$base/capella-*win32*.zip"

      - name: Upload Linux x86_64 packaged product
        uses: actions/upload-artifact@v4
        with:
          name: capella-product-linux-x86_64
          if-no-files-found: error
          path: releng/plugins/org.polarsys.capella.rcp.product/target/products/capella-*linux-gtk-x86_64.tar.gz

      - name: Upload Linux aarch64 packaged product
        uses: actions/upload-artifact@v4
        with:
          name: capella-product-linux-aarch64
          if-no-files-found: error
          path: releng/plugins/org.polarsys.capella.rcp.product/target/products/capella-*linux-gtk-aarch64.tar.gz

      - name: Upload macOS x86_64 packaged product
        uses: actions/upload-artifact@v4
        with:
          name: capella-product-macos-x86_64
          if-no-files-found: error
          path: releng/plugins/org.polarsys.capella.rcp.product/target/products/capella-*macosx-cocoa-x86_64.tar.gz

      - name: Upload macOS aarch64 packaged product
        uses: actions/upload-artifact@v4
        with:
          name: capella-product-macos-aarch64
          if-no-files-found: error
          path: releng/plugins/org.polarsys.capella.rcp.product/target/products/capella-*macosx-cocoa-aarch64.tar.gz

      - name: Upload Windows x86_64 packaged product
        uses: actions/upload-artifact@v4
        with:
          name: capella-product-windows-x86_64
          if-no-files-found: error
          path: releng/plugins/org.polarsys.capella.rcp.product/target/products/capella-*win32-win32-x86_64.zip

      - name: Upload product BOM
        uses: actions/upload-artifact@v4
        with:
          name: capella-product-bom
          if-no-files-found: error
          path: releng/plugins/org.polarsys.capella.rcp.product/target/bom.json

      - name: Upload p2 repositories
        uses: actions/upload-artifact@v4
        with:
          name: capella-update-sites
          if-no-files-found: error
          path: |
            releng/plugins/org.polarsys.capella.rcp.site/target/repository/**
            releng/plugins/org.polarsys.capella.test.site/target/repository/**
            releng/plugins/org.polarsys.capella.egf.site/target/repository/**

      - name: Upload Capella full target/update-site definition
        uses: actions/upload-artifact@v4
        with:
          name: capella-target-platform
          if-no-files-found: error
          path: releng/plugins/org.polarsys.capella.targets/full/*
