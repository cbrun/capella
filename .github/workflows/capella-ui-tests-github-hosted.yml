name: capella-ui-tests-github-hosted

on:
  workflow_run:
    workflows: ["capella-build"]
    types: [completed]
  workflow_dispatch:
    inputs:
      build_run_id:
        description: "GitHub Actions run id of capella-build to consume update-site artifacts from"
        required: true
        type: string
      build_branch:
        description: "Branch name used to resolve rolling product release assets (defaults to current ref)"
        required: false
        type: string

permissions:
  contents: read
  actions: read
  checks: write

concurrency:
  group: capella-ui-tests-github-hosted-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-tests:
    if: (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') && (github.event_name != 'workflow_run' || github.event.workflow_run.event != 'pull_request')
    runs-on: ubuntu-latest
    timeout-minutes: 720

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate/Install prerequisites
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v Xvfb >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y xvfb
          fi
          command -v Xvfb
          command -v tar
          command -v unzip
          command -v timeout
          command -v gh

      - name: Resolve rolling branch release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            branch="${{ github.event.workflow_run.head_branch }}"
          elif [[ -n "${{ inputs.build_branch }}" ]]; then
            branch="${{ inputs.build_branch }}"
          else
            branch="${{ github.ref_name }}"
          fi
          safe_branch="$(echo "${branch}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//')"
          if [[ -z "${safe_branch}" ]]; then
            safe_branch="branch"
          fi
          branch_hash="$(printf '%s' "${branch}" | sha1sum | cut -c1-8)"
          tag="ci-${safe_branch}-${branch_hash}-latest"
          echo "branch=${branch}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Download Linux product archive from rolling branch release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/capella-product-linux-x86_64
          gh release download "${{ steps.release.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "capella-linux-x86_64.tar.gz" \
            --dir artifacts/capella-product-linux-x86_64 \
            --clobber

      - name: Download update-sites artifact (from triggering workflow_run)
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}
          name: capella-update-sites
          path: artifacts/capella-update-sites

      - name: Download update-sites artifact (manual run-id)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.build_run_id }}
          name: capella-update-sites
          path: artifacts/capella-update-sites

      - name: Resolve artifact paths
        id: paths
        shell: bash
        run: |
          set -euo pipefail

          PRODUCT_TAR="$(find artifacts/capella-product-linux-x86_64 -type f -name 'capella-linux-x86_64.tar.gz' | head -n 1)"
          [ -n "$PRODUCT_TAR" ]

          # Downloaded artifact is rooted at:
          # org.polarsys.capella.test.site/target/repository/**
          TEST_SITE_REPO="$(find artifacts/capella-update-sites -type d -path '*/org.polarsys.capella.test.site/target/repository' | head -n 1)"
          [ -n "$TEST_SITE_REPO" ]

          echo "product_tar=$PRODUCT_TAR" >> "$GITHUB_OUTPUT"
          echo "test_site_repo=$TEST_SITE_REPO" >> "$GITHUB_OUTPUT"

      - name: Unpack Linux product
        shell: bash
        run: |
          set -euo pipefail
          rm -rf runtime
          mkdir -p runtime
          tar -xzf "${{ steps.paths.outputs.product_tar }}" -C runtime
          test -x runtime/capella/capella

      - name: Install Capella test feature with p2 director
        shell: bash
        run: |
          set -euo pipefail

          CAPELLA_HOME="$PWD/runtime/capella"
          CAPELLA_BIN="$CAPELLA_HOME/capella"
          TEST_REPO="${{ steps.paths.outputs.test_site_repo }}"

          "$CAPELLA_BIN" \
            -nosplash \
            -consoleLog \
            -application org.eclipse.equinox.p2.director \
            -repository "file:${TEST_REPO}" \
            -installIU org.polarsys.capella.test.feature.feature.group \
            -destination "$CAPELLA_HOME" \
            -bundlepool "$CAPELLA_HOME" \
            -profile DefaultProfile \
            -profileProperties org.eclipse.update.install.features=true

      - name: Run Jenkins-equivalent UI and non-UI suites on Xvfb
        shell: bash
        run: |
          set -euo pipefail

          CAPELLA_HOME="$PWD/runtime/capella"
          CAPELLA_BIN="$CAPELLA_HOME/capella"
          RESULT_DIR="$PWD/test-results"
          WORK_BASE="$PWD/test-workspaces"
          mkdir -p "$RESULT_DIR" "$WORK_BASE"

          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 >"$RESULT_DIR/xvfb.log" 2>&1 &
          XVFB_PID=$!
          trap 'kill "$XVFB_PID" >/dev/null 2>&1 || true' EXIT
          sleep 2

          PORT_BASE=25000
          CASE_INDEX=0

          wait_for_listener() {
            local listener_pid="$1"
            local suite_id="$2"
            local waited=0

            while kill -0 "$listener_pid" >/dev/null 2>&1; do
              if [ "$waited" -ge 10 ]; then
                echo "[WARN ] ${suite_id} listener still running after 10s; forcing stop"
                kill "$listener_pid" >/dev/null 2>&1 || true
                wait "$listener_pid" >/dev/null 2>&1 || true
                return
              fi
              sleep 1
              waited=$((waited + 1))
            done
          }

          run_case() {
            local mode="$1"      # ui|nonui
            local bucket="$2"
            local plugin="$3"
            local class_name="$4"

            local app_id="org.eclipse.pde.junit.runtime.uitestapplication"
            if [ "$mode" = "nonui" ]; then
              app_id="org.eclipse.pde.junit.runtime.coretestapplication"
            fi

            local workdir="$WORK_BASE/$bucket"
            local logfile="$RESULT_DIR/${bucket}__${class_name}.log"
            local listener_log="$RESULT_DIR/${bucket}__${class_name}__listener.log"
            local listener_ws="$WORK_BASE/listener-${bucket}-${CASE_INDEX}"
            local port=$((PORT_BASE + CASE_INDEX))
            local suite_id="${bucket}__${class_name}"
            CASE_INDEX=$((CASE_INDEX + 1))
            mkdir -p "$workdir" "$listener_ws"
            suite_id="$(echo "$suite_id" | tr -c '[:alnum:]_.-' '_')"

            echo "[START] $bucket :: $class_name"
            (
              cd "$RESULT_DIR"
              "$CAPELLA_BIN" \
                -nosplash \
                -consoleLog \
                -data "$listener_ws" \
                -application org.polarsys.capella.test.run.application \
                -port "$port" \
                -title "$suite_id" \
                >"$listener_log" 2>&1
            ) &
            local listener_pid=$!
            sleep 2
            if ! kill -0 "$listener_pid" >/dev/null 2>&1; then
              echo "[FAIL ] $bucket :: $class_name (listener did not start)"
              return 1
            fi

            set +e
            timeout 60m "$CAPELLA_BIN" \
              -nosplash \
              -consoleLog \
              -application "$app_id" \
              -port "$port" \
              -testpluginname "$plugin" \
              -classname "$class_name" \
              -data "$workdir" \
              -clean \
              >"$logfile" 2>&1
            local rc=$?
            set -e
            wait_for_listener "$listener_pid" "$suite_id"

            if [ "$rc" -ne 0 ]; then
              echo "[FAIL ] $bucket :: $class_name (exit=$rc)"
              return "$rc"
            fi
            echo "[PASS ] $bucket :: $class_name"
          }

          # Jenkins: ModelQueriesValidation
          run_case ui ModelQueriesValidation org.polarsys.capella.test.suites.ju org.polarsys.capella.test.business.queries.ju.testSuites.main.BusinessQueryTestSuite
          run_case ui ModelQueriesValidation org.polarsys.capella.test.suites.ju org.polarsys.capella.test.semantic.queries.ju.testsuites.SemanticQueriesTestSuite
          run_case ui ModelQueriesValidation org.polarsys.capella.test.suites.ju org.polarsys.capella.test.validation.rules.ju.testsuites.main.ValidationRulesTestSuite

          # Jenkins: LibRecTransition
          run_case ui LibRecTransition org.polarsys.capella.test.suites.ju org.polarsys.capella.test.libraries.ju.testsuites.main.LibrariesTestSuite
          run_case ui LibRecTransition org.polarsys.capella.test.suites.ju org.polarsys.capella.test.libraries.ui.ju.testsuites.main.LibrariesUITestSuite
          run_case ui LibRecTransition org.polarsys.capella.test.suites.ju org.polarsys.capella.test.recrpl.ju.testsuites.main.RecRplTestSuite
          run_case ui LibRecTransition org.polarsys.capella.test.suites.ju org.polarsys.capella.test.transition.ju.testsuites.main.TransitionTestSuite
          run_case ui LibRecTransition org.polarsys.capella.test.suites.ju org.polarsys.capella.test.re.updateconnections.ju.UpdateConnectionsTestSuite

          # Jenkins: DiagramTools1/2, DiagramMiscFilters
          run_case ui DiagramTools1 org.polarsys.capella.test.suites.ju org.polarsys.capella.test.diagram.tools.ju.testsuites.main.DiagramToolsStep1TestSuite
          run_case ui DiagramTools2 org.polarsys.capella.test.suites.ju org.polarsys.capella.test.diagram.tools.ju.testsuites.main.DiagramToolsStep2TestSuite
          run_case ui DiagramMiscFilters org.polarsys.capella.test.suites.ju org.polarsys.capella.test.diagram.misc.ju.testsuites.DiagramMiscTestSuite
          run_case ui DiagramMiscFilters org.polarsys.capella.test.suites.ju org.polarsys.capella.test.diagram.filters.ju.testsuites.DiagramFiltersTestSuite
          run_case ui DiagramMiscFilters org.polarsys.capella.test.suites.ju org.polarsys.capella.test.table.ju.testsuite.TableTestSuite

          # Jenkins: Fragmentation, Odesign, Views
          run_case ui Fragmentation org.polarsys.capella.test.suites.ju org.polarsys.capella.test.fragmentation.ju.testsuites.FragmentationTestSuite
          run_case ui Odesign org.polarsys.capella.test.suites.ju org.polarsys.capella.test.odesign.ju.maintestsuite.ODesignTestSuite
          run_case ui Views org.polarsys.capella.test.suites.ju org.polarsys.capella.test.model.ju.testsuites.main.ModelTestSuite
          run_case ui Views org.polarsys.capella.test.suites.ju org.polarsys.capella.test.massactions.ju.testsuites.MassActionsTestSuite
          run_case ui Views org.polarsys.capella.test.suites.ju org.polarsys.capella.test.platform.ju.testsuites.PlatformTestSuite
          run_case ui Views org.polarsys.capella.test.suites.ju org.polarsys.capella.test.richtext.ju.testsuites.RichtextTestSuite
          run_case ui Views org.polarsys.capella.test.suites.ju org.polarsys.capella.test.fastlinker.ju.testsuites.FastLinkerTestsSuite
          run_case ui Views org.polarsys.capella.test.suites.ju org.polarsys.capella.test.explorer.activity.ju.testsuites.ActivityExplorerTestsSuite
          run_case ui Views org.polarsys.capella.test.suites.ju org.polarsys.capella.test.progressmonitoring.ju.testsuites.SetProgressTestSuite
          run_case ui Views org.polarsys.capella.test.suites.ju org.polarsys.capella.test.navigator.ju.testsuites.main.NavigatorUITestSuite
          run_case ui Views org.polarsys.capella.test.suites.ju org.polarsys.capella.test.semantic.ui.ju.testsuites.SemanticUITestSuite

          # Jenkins: MigrationCommandLine, Benchmark, Detach, Documentation
          run_case ui MigrationCommandLine org.polarsys.capella.test.suites.ju org.polarsys.capella.test.migration.ju.testsuites.main.MigrationTestSuite
          run_case ui MigrationCommandLine org.polarsys.capella.test.suites.ju org.polarsys.capella.test.diagram.layout.ju.testsuites.LayoutTestSuite
          run_case ui MigrationCommandLine org.polarsys.capella.test.suites.ju org.polarsys.capella.test.commandline.ju.testsuites.CommandLineTestSuite
          run_case ui Benchmark org.polarsys.capella.test.suites.ju org.polarsys.capella.test.benchmarks.ju.suites.AllBenchmarksTestSuite
          run_case ui Detach org.polarsys.capella.test.suites.ju org.polarsys.capella.test.model.ju.testsuites.partial.DetachTestSuite
          run_case ui Documentation org.polarsys.capella.test.doc.ju org.polarsys.capella.test.doc.ju.testsuites.DocTestSuite

          # Jenkins: NotUINavigator
          run_case nonui NotUINavigator org.polarsys.capella.test.suites.ju org.polarsys.capella.test.navigator.ju.testsuites.main.NavigatorTestSuite

      - name: Flatten nested JUnit XML for report
        if: ${{ !cancelled() }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results/flat
          python3 - <<'PY'
          from copy import deepcopy
          from pathlib import Path
          import xml.etree.ElementTree as ET

          in_dir = Path("test-results")
          out_dir = in_dir / "flat"
          xml_files = sorted(p for p in in_dir.glob("*.xml") if p.is_file())
          if not xml_files:
            raise SystemExit("No JUnit XML files found in test-results/")

          def all_cases(node):
            return list(node.findall(".//testcase"))

          def direct_cases(node):
            return [c for c in list(node) if c.tag == "testcase"]

          def child_suites(node):
            return [c for c in list(node) if c.tag == "testsuite"]

          def flatten_suite(suite):
            suites = []
            cases = direct_cases(suite)
            if cases:
              suites.append((suite, cases))
            for nested in child_suites(suite):
              suites.extend(flatten_suite(nested))
            return suites

          in_case_count = 0
          out_case_count = 0
          out_suite_count = 0

          for src in xml_files:
            root = ET.parse(src).getroot()
            if root.tag == "testsuites":
              roots = [s for s in list(root) if s.tag == "testsuite"]
            elif root.tag == "testsuite":
              roots = [root]
            else:
              raise SystemExit(f"{src}: unsupported root tag <{root.tag}>")

            in_case_count += len(all_cases(root))
            out_root = ET.Element("testsuites")
            for suite in roots:
              for original, cases in flatten_suite(suite):
                attrs = dict(original.attrib)
                attrs["tests"] = str(len(cases))
                attrs["failures"] = str(sum(1 for c in cases if c.find("failure") is not None))
                attrs["errors"] = str(sum(1 for c in cases if c.find("error") is not None))
                attrs["skipped"] = str(sum(1 for c in cases if c.find("skipped") is not None))
                if "time" not in attrs:
                  attrs["time"] = str(sum(float(c.attrib.get("time", "0") or "0") for c in cases))

                out_suite = ET.SubElement(out_root, "testsuite", attrs)
                for c in cases:
                  out_suite.append(deepcopy(c))
                out_case_count += len(cases)
                out_suite_count += 1

            out_path = out_dir / src.name
            out_tree = ET.ElementTree(out_root)
            ET.indent(out_tree, space="  ")
            out_tree.write(out_path, encoding="utf-8", xml_declaration=True)

          if in_case_count != out_case_count:
            raise SystemExit(
              f"Flattening mismatch: in={in_case_count}, out={out_case_count}"
            )

          print(
            f"Flattened {len(xml_files)} files into {out_suite_count} flat suites "
            f"with {out_case_count} testcases."
          )
          PY

      - name: Publish UI test report
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@v3
        with:
          name: Capella UI tests (github-hosted)
          # Capella generates nested <testsuite>; flatten first for java-junit parser accuracy.
          path: test-results/flat/*.xml
          reporter: java-junit
          only-summary: "false"
          use-actions-summary: "true"
          fail-on-error: "true"
          fail-on-empty: "true"

      - name: Upload UI test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capella-ui-test-logs-gh-hosted
          if-no-files-found: warn
          path: |
            test-results/**
            test-workspaces/**/.metadata/.log
